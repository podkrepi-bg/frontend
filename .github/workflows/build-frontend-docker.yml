name: Build frontend Docker image

on:
  workflow_call:
    inputs:
      environment:
        description: "Environment to build for (test, dev, prod)"
        required: true
        type: string
      push:
        description: "Push the image to the registry"
        required: false
        type: boolean
        default: false
      image_tag:
        description: "Docker image tag"
        required: false
        type: string
        default: "ghcr.io/podkrepi-bg/frontend:pr"
      version:
        description: "Application version"
        required: false
        type: string
        default: "unversioned"
      ref:
        description: "Git ref to checkout"
        required: false
        type: string
    secrets:
      SENTRY_DSN:
        required: false
      SENTRY_AUTH_TOKEN:
        required: false
      MONDOO_SECRET:
        required: true

jobs:
  build:
    name: Build (${{ inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Login to GitHub Packages Docker Registry
        if: ${{ inputs.push }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create build env file
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          yq -r '.shared + .${{ inputs.environment }} | to_entries[] | .key + "=" + .value' \
            .github/build-env.yml > .env.production
          echo "SENTRY_DSN=${SENTRY_DSN}" >> .env.production
          echo "SENTRY_AUTH_TOKEN=${SENTRY_AUTH_TOKEN}" >> .env.production

      - name: Build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push }}
          target: runner
          build-args: |
            VERSION=${{ inputs.version }}
          tags: ${{ inputs.image_tag }}

      - name: Scan with Mondoo
        uses: mondoohq/actions/docker-image@main
        env:
          MONDOO_CONFIG_BASE64: ${{ secrets.MONDOO_SECRET }}
        with:
          image: ${{ inputs.image_tag }}
