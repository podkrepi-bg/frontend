name: Playwright tests
on:
  workflow_call:
  workflow_dispatch:
env:
  STRIPE_DEV_PUBLISHABLE_KEY: ${{ vars.STRIPE_DEV_PUBLISHABLE_KEY }}

jobs:
  run-playwright:
    name: Run Playwright
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: './frontend'
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          repository: podkrepi-bg/api
          ref: master
          path: './api'

      - name: Set yarn version
        run: yarn set version berry

      - name: Get yarn cache directory path
        id: yarn-cache-dir-path
        run: echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        with:
          path: |
            ${{ steps.yarn-cache-dir-path.outputs.dir }}
            **/.next/cache
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Run db and keycloak
        working-directory: ./api
        run: docker compose up -d pg-db keycloak

      - name: Setup Stripe secret for webhook container
        working-directory: ./api
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: printf 'STRIPE_SECRET_KEY=%s\n' "$STRIPE_SECRET_KEY" >> .env.local

      - name: Run stripe webhook
        working-directory: ./api
        run: docker compose up -d stripe-webhook

      - uses: actions/setup-node@v6
        with:
          node-version: '18'
          package-manager-cache: false

      - name: Install backend dependencies
        working-directory: ./api
        run: yarn

      - name: Seed database
        working-directory: ./api
        run: yarn prisma generate && yarn prisma migrate deploy && yarn prisma db seed

      - name: Wait for stripe webhook secret
        working-directory: ./api
        run: |
          for i in $(seq 1 30); do
            if grep -q 'whsec_' .env.local 2>/dev/null; then
              echo "Stripe webhook secret found"
              break
            fi
            echo "Waiting for stripe webhook secret... ($i/30)"
            sleep 2
          done
          if ! grep -q 'whsec_' .env.local 2>/dev/null; then
            echo "ERROR: Stripe webhook secret not found after 60s"
            docker compose logs stripe-webhook
            exit 1
          fi

      - name: Run backend
        working-directory: ./api
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          export STRIPE_WEBHOOK_SECRET=$(grep STRIPE_WEBHOOK_SECRET .env.local | tail -1 | cut -d= -f2)
          yarn start &> api.log &

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: yarn install --immutable

      - name: Install e2e Dependencies
        working-directory: ./frontend/e2e
        run: yarn install --immutable

      - name: Setup env
        working-directory: ./frontend
        run: cp .env.local.example .env.local

      - name: Build frontend
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ env.STRIPE_DEV_PUBLISHABLE_KEY }}
        run: yarn run next build

      - name: Wait on backend
        uses: iFaxity/wait-on-action@v1
        with:
          resource: http-get://localhost:5010/api/v1/campaign/list
          timeout: 120000

      - name: Test Backend is ready
        working-directory: ./frontend
        run: curl http://localhost:5010/api/v1/campaign/list

      - name: Start frontend
        working-directory: ./frontend
        run: yarn start &> frontend.log &

      - name: Install Playwright Browsers
        working-directory: ./frontend/e2e
        run: yarn run playwright:install

      - name: Wait on frontend
        uses: iFaxity/wait-on-action@v1
        with:
          resource: http-get://localhost:3040
          timeout: 120000

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: yarn run test:e2e

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: ./frontend/e2e/test-results/
          retention-days: 14
          overwrite: true

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: ./frontend/e2e/e2e-reports/
          retention-days: 14
          overwrite: true

      - name: Collect stripe webhook logs
        if: always()
        working-directory: ./api
        run: docker compose logs stripe-webhook > stripe-webhook.log 2>&1 || true

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: logs
          path: |
            ./frontend/frontend.log
            ./api/api.log
            ./api/stripe-webhook.log
          retention-days: 14
