name: Check PR

on:
  workflow_dispatch:
  pull_request:
    branches: [master]

jobs:
  validate-env:
    name: Validate env config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate .env.local.example against build-env.yml
        run: bash .github/scripts/validate-env.sh

  tests:
    name: Tests
    if: |
      !github.event.pull_request.head.repo.fork && github.event.pull_request.user.login != 'dependabot[bot]'
    uses: ./.github/workflows/tests.yml
    secrets: inherit